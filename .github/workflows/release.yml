name: Release

on:
    push:
        tags:
            - '[0-9]*'

permissions:
    contents: write

jobs:
    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci
            - run: npm test

            - name: Pack tarball
              run: npm pack

            - name: Build binaries
              run: |
                  npx pkg bin/bright-sdk.js \
                    --targets node18-linux-x64,node18-macos-x64,node18-macos-arm64,node18-win-x64 \
                    --out-path dist \
                    --compress Brotli

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  generate_release_notes: true
                  files: |
                      *.tgz
                      dist/bright-sdk-linux-x64
                      dist/bright-sdk-macos-x64
                      dist/bright-sdk-macos-arm64
                      dist/bright-sdk-win-x64.exe
